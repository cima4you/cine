        tailwind.config = {
            theme: {
                extend: {
                    colors: {

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700;800;900&display=swap');
        * { font-family: 'Noto Sans Arabic', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #EDEAE0 !important; min-height: 100vh; color: #1a1a2e; }

        ::-webkit-scrollbar { width: 6px; height: 4px; }
        ::-webkit-scrollbar-track { background: #0b1a25; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

        .movie-card {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            background: #222;
            transition: transform .35s cubic-bezier(.4,0,.2,1), box-shadow .35s cubic-bezier(.4,0,.2,1);
            cursor: pointer;
            border: 1px solid rgba(212,168,67,.08);
            flex-shrink: 0;
        }
        .movie-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 16px 32px rgba(212,168,67,.1);
            border-color: rgba(212,168,67,.2);
        }
        .movie-card .poster-wrapper {
            position: relative;
            aspect-ratio: 2/3;
            overflow: hidden;
            background: #0b1a25;
        }
        .turkish-scroll .movie-card .poster-wrapper,
        .movie-card.series-card .poster-wrapper {
            aspect-ratio: 37/23;
        }
        .movie-card.foreign-series-card .poster-wrapper {
            aspect-ratio: 2/3;
        }
        .movie-card .poster-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover !important;
            transition: transform .5s cubic-bezier(.4,0,.2,1);
        }
        .movie-card:hover .poster-wrapper img {
            transform: scale(1.08);
        }
        .movie-card .poster-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(transparent, rgba(0,0,0,.85));
        }
        .movie-card .card-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 10px 10px;
            z-index: 2;
        }
        .movie-card .card-info h3 {
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-shadow: 0 1px 4px rgba(0,0,0,.8);
        }
        .movie-card .card-info .meta {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 3px;
            font-size: 10px;
            color: #fff;
        }
        .movie-card .card-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            z-index: 3;
            padding: 2px 8px;
            border-radius: 5px;
            font-size: 10px;
            font-weight: 700;
            background: rgba(212,168,67,.85);
            color: #111;
            backdrop-filter: blur(4px);
        }
        .badge-teal { background: rgba(45,212,191,.85) !important; }
        .badge-blue { background: rgba(96,165,250,.85) !important; }
        .badge-orange { background: rgba(251,146,60,.85) !important; }
        .badge-red { background: rgba(248,113,113,.85) !important; }
        .badge-purple { background: rgba(192,132,252,.85) !important; }
        .badge-pink { background: rgba(244,114,182,.85) !important; }
        .badge-gold { background: rgba(212,168,67,.85) !important; }
        .movie-card .card-rating {
            position: absolute;
            top: 6px;
            left: 6px;
            z-index: 3;
            padding: 2px 6px;
            border-radius: 5px;
            font-size: 10px;
            font-weight: 700;
            background: rgba(0,0,0,.6);
            color: #d4a843;
            backdrop-filter: blur(4px);
        }

        /* Section horizontal scroll */
        .scroll-wrapper { position: relative; }
        .section-scroll {
            display: flex;
            gap: 8px;
            overflow-x: scroll;
            overflow-y: hidden;
            padding: 4px 0 8px;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        .section-scroll::-webkit-scrollbar { height: 6px; }
        .section-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,.05); border-radius: 3px; }
        .section-scroll::-webkit-scrollbar-thumb { background: rgba(212,168,67,.3); border-radius: 3px; }
        .section-scroll::-webkit-scrollbar-thumb:hover { background: rgba(212,168,67,.5); }
        .section-scroll .movie-card {
            width: 200px;
            flex-shrink: 0;
        }
        .section-scroll        .turkish-scroll .movie-card {
            width: 300px;
        }
        .scroll-overlay {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            width: 34px; height: 34px;
            border: none; border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px; font-weight: 700;
            color: #d4a843;
            background: rgba(20,20,20,.88);
            transition: background .2s, color .2s;
            border: 2px solid rgba(212,168,67,.35);
            box-shadow: 0 0 10px rgba(0,0,0,.6);
            padding: 0;
            line-height: 1;
        }
        .scroll-overlay:hover { background: #d4a843; color: #111; }
        .scroll-overlay.hidden-arrow { display: none !important; }
        .scroll-overlay.next { right: 5px; }
        .scroll-overlay.prev { left: 5px; }

        #backHomeRow { position: sticky; top: 0; z-index: 20; background: rgba(11,26,37,.9); backdrop-filter: blur(8px); padding-top: 8px; padding-bottom: 8px; }
        .glass-filter {
            background: rgba(255,255,255,.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0,0,0,.08);
            border-radius: 12px;
        }
        #sideNavList a {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border-radius: 8px;
            color: #ccc;
            font-size: 13px;
            text-decoration: none;
            transition: background .2s, color .2s;
        }
        #sideNavList a:hover {
            background: rgba(212,168,67,.1);
            color: #d4a843;
        }
        #sideNavList a .nav-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        body.nav-open { overflow: hidden; }
        #backToTop {
            position: fixed;
            bottom: 24px; left: 24px;
            z-index: 30;
            width: 40px; height: 40px;
            border-radius: 50%;
            border: 2px solid rgba(0,0,0,.15);
            background: #fff;
            color: #1a1a2e;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(0,0,0,.1);
            transition: opacity .3s, transform .3s;
            opacity: 0;
            pointer-events: none;
            transform: translateY(10px);
        }
        #backToTop.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }
        #backToTop:hover {
            background: #d4a843;
            color: #fff;
            border-color: #d4a843;
        }
        .glass-modal {
            background: rgba(20,20,20,.96);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(212,168,67,.1);
        }

        input, select {
            background: #fff !important;
            border: 1px solid rgba(0,0,0,.15) !important;
            color: #1a1a2e !important;
            border-radius: 8px !important;
            padding: 8px 12px !important;
            font-size: 13px !important;
            transition: border-color .3s;
        }
        input:focus, select:focus {
            border-color: #d4a843 !important;
            outline: none !important;
            box-shadow: 0 0 0 3px rgba(212,168,67,.2) !important;
        }
        input::placeholder { color: rgba(0,0,0,.35); }

        .btn-primary {
            background: linear-gradient(135deg, #d4a843, #b8922f);
            color: #0d1b2a;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            padding: 8px 20px;
            cursor: pointer;
            transition: transform .2s, box-shadow .2s;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(212,168,67,.25); }

        .server-btn {
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(212,168,67,.2);
            background: rgba(30,30,30,.8);
            color: #ccc;
            transition: all .3s;
            white-space: nowrap;
        }
        .server-btn:hover { border-color: #d4a843; color: #d4a843; background: rgba(212,168,67,.08); }
        .server-btn.active { background: #d4a843; color: #111; border-color: #d4a843; box-shadow: 0 0 12px rgba(212,168,67,.3); }

        .episode-btn {
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,.1);
            background: rgba(255,255,255,.04);
            color: #999;
            transition: all .3s;
        }
        .episode-btn:hover { border-color: #d4a843; color: #d4a843; }
        .episode-btn.active { background: #d4a843; color: #111; border-color: #d4a843; }

        .season-btn {
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            border: 2px solid rgba(212,168,67,.25);
            background: rgba(212,168,67,.08);
            color: #ccc;
            transition: all .3s;
        }
        .season-btn:hover { border-color: #d4a843; color: #d4a843; }
        .season-btn.active { background: #d4a843; color: #111; border-color: #d4a843; }

        .page-btn {
            padding: 6px 14px;
            border-radius: 8px;
            background: #fff;
            color: #1a1a2e;
            border: 1px solid rgba(0,0,0,.12);
            cursor: pointer;
            transition: all .3s;
            font-size: 13px;
        }
        .page-btn:hover { border-color: #d4a843; color: #d4a843; background: rgba(212,168,67,.08); }
        .page-btn.active-page { background: #d4a843; color: #fff; border-color: #d4a843; }
        .page-btn:disabled { opacity: .4; cursor: not-allowed; color: rgba(0,0,0,.3); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp .4s ease forwards; }

        .section-title-btn {
            background: none;
            border: none;
            color: #d4a843;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: color .2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .section-title-btn:hover { color: #f0d68a; }

        .active-tab {
            background: rgba(212,168,67,.15) !important;
            border-color: #d4a843 !important;
            color: #d4a843 !important;
        }

        .section-accent { border-bottom: 2px solid rgba(212,168,67,.2); padding-bottom: 4px; }
        .section-accent-teal { border-bottom: 2px solid rgba(45,212,191,.25); }
        .section-accent-blue { border-bottom: 2px solid rgba(96,165,250,.25); }
        .section-accent-orange { border-bottom: 2px solid rgba(251,146,60,.25); }
        .section-accent-red { border-bottom: 2px solid rgba(248,113,113,.25); }
        .section-accent-purple { border-bottom: 2px solid rgba(192,132,252,.25); }
        .section-accent-pink { border-bottom: 2px solid rgba(244,114,182,.25); }
        .section-accent-gold { border-bottom: 2px solid rgba(212,168,67,.25); }

        @media (max-width: 640px) {
            .movie-card .card-info h3 { font-size: 11px; }
            .movie-card .card-info .meta { font-size: 9px; }
            .section-scroll .movie-card { width: 180px; }
        }
    </style>
</head>
<body class="bg-gradient-to-b from-[#1a1a1a] via-[#222] to-[#111]">

    <!-- ===== HEADER / HERO ===== -->
    <header class="relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-b from-[#d4a843]/6 via-transparent to-transparent pointer-events-none"></div>
        <div class="relative w-full px-3 md:px-5 pt-3 pb-4">
            <!-- Top bar: menu+logo | search | sign in -->
            <div class="flex items-center justify-between gap-2 mb-3">
                <div class="flex items-center gap-2">
                    <button id="navToggle" class="flex items-center justify-center w-9 h-9 rounded-lg border border-gray-700 text-gray-400 hover:text-white hover:border-[#d4a843]/50 transition-colors" title="القائمة">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                    </button>
                    <a href="#" id="logoLink" class="flex items-center gap-2 no-underline">
                        <img src="logo.png" alt="رشيد" class="w-8 h-8 rounded-lg object-cover">
                        <span class="hidden sm:inline text-lg font-black bg-gradient-to-l from-[#d4a843] via-[#f0d68a] to-[#b8922f] bg-clip-text text-transparent">R-CINE</span>
                    </a>
                </div>
                <div class="hidden md:block flex-1 max-w-md mx-auto">
                    <form onsubmit="return false;" class="relative">
                        <input id="headerSearch" type="text" placeholder="بحث..." class="w-full text-sm bg-[#0b1a25]/60 border border-gray-700 rounded-lg py-1.5 pr-3 pl-9 text-gray-200 placeholder-gray-500 focus:outline-none focus:border-[#d4a843]/50 transition-colors">
                        <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    </form>
                </div>
                <div class="flex items-center gap-2">
                    <button id="mobileSearchBtn" class="flex md:hidden items-center justify-center w-9 h-9 rounded-lg border border-gray-700 text-gray-400 hover:text-white hover:border-[#d4a843]/50 transition-colors" title="بحث">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    </button>
                    <a class="hidden sm:inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg border border-[#d4a843]/30 text-[#d4a843] hover:bg-[#d4a843]/10 transition-colors" href="#modal-login-form" data-toggle="modal" data-target="#modal-login-form">Sign in</a>
                </div>
            </div>
            <!-- Title + tags -->
            <div class="text-center">
                <h1 class="text-xl md:text-3xl font-black tracking-tight bg-gradient-to-l from-[#d4a843] via-[#f0d68a] to-[#b8922f] bg-clip-text text-transparent">
                    R-CINE
                </h1>
                <p class="mt-1 text-gray-500 text-xs md:text-sm max-w-lg mx-auto">أفلام أجنبية · عربية · هندية · آسيوية · مسلسلات</p>
                <div class="mt-2 flex items-center justify-center gap-2 text-xs text-gray-500">
                    <span id="totalCount" class="px-3 py-1 rounded-full border border-gray-700"></span>
                    <span class="px-3 py-1 rounded-full border border-gray-700">تحديث يومي</span>
                    <span class="px-3 py-1 rounded-full border border-gray-700">مشاهدة مباشرة</span>
                </div>
            </div>
        </div>
        <!-- Side navigation -->
        <div id="sideNavOverlay" class="fixed inset-0 bg-black/60 z-40 hidden opacity-0 transition-opacity duration-300"></div>
        <div id="sideNav" class="fixed top-0 right-0 h-full w-64 bg-[#0b1a25] border-l border-gray-800 z-50 transform translate-x-full transition-transform duration-300 overflow-y-auto shadow-2xl">
            <div class="flex items-center justify-between p-4 border-b border-gray-800">
                <span class="text-sm font-bold text-[#d4a843]">القوائم</span>
                <button id="sideNavClose" class="text-gray-500 hover:text-white transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <nav id="sideNavList" class="p-3"></nav>
        </div>
    </header>

    <button id="backToTop" title="العودة للأعلى">↑</button>
    <!-- ===== FILTERS ===== -->
    <section class="w-full px-3 md:px-5 mb-4">
        <div class="glass-filter p-2.5 md:p-3">
            <div class="flex flex-col md:flex-row gap-2">
                <div class="relative flex-1">
                    <input type="text" id="searchInput" placeholder="🔍 ابحث عن فيلم أو مسلسل..." class="w-full text-sm">
                    <button id="clearSearch" class="absolute left-1 top-1/2 -translate-y-1/2 w-6 h-6 flex items-center justify-center text-gray-400 hover:text-gray-600 transition-colors" style="display:none">&times;</button>
                </div>
                <select id="typeFilter" class="md:w-24 text-sm">
                    <option value="all">📂 الكل</option>
                    <option value="movie">🎥 أفلام</option>
                    <option value="series">📺 مسلسلات</option>
                </select>
                <select id="categoryFilter" class="md:w-28 text-sm">
                    <option value="all">🏷️ التصنيف</option>
                    <option value="اجنبي">🌍 أجنبية</option>
                    <option value="عربي">🌙 عربية</option>
                    <option value="هندي">🇮🇳 هندية</option>
                    <option value="اسيوي">🏯 آسيوية</option>
                    <option value="تركي">🇹🇷 تركية</option>
                    <option value="نتفليكس">📺 نت فليكس</option>
                    <option value="انمي">🎌 أنمي</option>
                    <option value="مدبلج">🔊 مدبلج</option>
                    <option value="وثائقي">📖 وثائقي</option>
                    <option value="اخرى">📦 أخرى</option>
                    <option value="imdb">⭐ Top IMDb</option>
                    <option value="streamimdb">🎬 أفلام أجنبية أصلية</option>
                    <option value="ooanime">🎬 كرتون الزمن الجميل</option>
                </select>
                <select id="yearFilter" class="md:w-20 text-sm">
                    <option value="all">📅 السنة</option>
                </select>
                <select id="sortFilter" class="md:w-28 text-sm">
                    <option value="default">📌 ترتيب</option>
                    <option value="newest">🆕 الأحدث</option>
                    <option value="oldest">📀 الأقدم</option>
                    <option value="rating">⭐ التقييم</option>
                    <option value="alpha">🔤 أ-ي</option>
                    <option value="random">🔀 عشوائي</option>

                <button id="resetFilters" class="px-3 py-1.5 text-sm rounded-lg border border-gray-300 text-gray-500 hover:border-red-400 hover:text-red-500 hover:bg-red-50 transition-colors" style="display:none">✕ مسح</button>
            </div>
        </div>
    </section>

    <!-- ===== COUNTER ===== -->
    <section class="w-full px-3 md:px-5 mb-2">
        <div id="counter" class="text-gray-400 text-xs"></div>
    </section>

    <!-- ===== SECTIONS CONTAINER (shown by default) ===== -->
    <section id="sectionsContainer" class="w-full px-3 md:px-5">
    </section>

    <!-- ===== MOVIE GRID (shown when filter/search active) ===== -->
    <section id="movieGrid" class="w-full px-3 md:px-5 grid grid-cols-2 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-7 xl:grid-cols-8 gap-2 md:gap-3" style="display:none">
    </section>

    <!-- ===== LOADING ===== -->
    <div id="loading" class="flex justify-center items-center py-16" style="display:none">
        <div class="w-8 h-8 border-3 border-[#d4a843]/20 border-t-[#d4a843] rounded-full animate-spin"></div>
    </div>

    <!-- ===== PAGINATION ===== -->
    <section id="pagination" class="w-full px-3 md:px-5 my-6 flex flex-wrap justify-center gap-1.5">

    <div id="videoModal" class="fixed inset-0 z-50 flex items-center justify-center p-4" style="display:none; background: rgba(0,0,0,.88); backdrop-filter: blur(8px);">

        <div id="closeModal" class="absolute top-4 left-4 w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center cursor-pointer text-white/60 hover:text-white hover:bg-white/10 transition z-50" style="font-size:22px">&times;</div>

        <div class="glass-modal w-full max-w-4xl max-h-[90vh] overflow-y-auto rounded-2xl p-5 md:p-8 relative" style="scrollbar-width:thin">

            <div class="flex flex-col md:flex-row gap-6 mb-6">
                <div id="modalPoster" class="w-32 md:w-40 shrink-0 rounded-xl overflow-hidden bg-gray-800 aspect-[37/23]">

                <div class="flex-1 min-w-0">
                    <h2 id="modalTitle" class="text-xl md:text-2xl font-bold text-white mb-2"></h2>

                        <div class="text-4xl mb-2 opacity-40">▶</div>

                <span class="text-xs text-gray-500">🔊 الصوت:</span>

                <span id="volumeLabel" class="text-xs text-gray-500 w-8 text-left">100%</span>
            </div>

            <div id="serverLabel" class="text-sm text-gray-500 mb-2" style="display:none">🎬 سيرفرات المشاهدة:</div>
            <div id="serverList" class="flex flex-wrap gap-2 mb-4"></div>

            <div id="downloadSection" class="mb-4 p-4 rounded-xl bg-gray-800/60" style="display:none">
                <div class="text-sm text-gray-500 mb-2">🔽 التحميل:</div>
                <div id="downloadList" class="flex flex-wrap gap-2"></div>
            </div>

            <div id="movieInfo" class="text-sm text-gray-500 leading-relaxed"></div>

        </div>
    </div>

    <script>
        // ===== STATE =====
        let currentPage = 1;
        const ITEMS_PER_PAGE = 32;
        let filteredMovies = [];
        let showingGrid = false;
        let sortMode = 'default';

        const NO_POSTER = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="300" height="450" viewBox="0 0 300 450"><rect fill="#152238" width="300" height="450"/><text x="150" y="225" fill="#444" font-family="sans-serif" font-size="16" text-anchor="middle" dominant-baseline="middle">No Poster</text></svg>');
        const PLACEHOLDER_SVG = NO_POSTER;

        // Category definitions
        const CATEGORIES = [
            { id: 'recent', label: '🆕 مضاف حديثا', type: null, contentType: null, limit: 64, clr: 'gold' },
            { id: 'imdb', label: '⭐ Top 250 IMDb', type: 'IMDb', contentType: 'movie', limit: 246, clr: 'gold' },
            { id: 'streamimdb', label: '🎬 أفلام أجنبية أصلية', type: null, contentType: null, typeCheck: (t) => t === 'StreamIMDb', limit: 100, clr: 'blue' },
            { id: 'foreign', label: '🌍 أفلام أجنبية', type: 'أجنبي', contentType: 'movie', limit: 100, clr: 'blue' },
    { id: 'foreign-series', label: '🌍 مسلسلات أجنبية', type: 'أجنبي', contentType: 'series', limit: 100, clr: 'blue' },
            { id: 'netflix', label: '📺 نت فليكس', type: 'نتفليكس', contentType: null, limit: 100, clr: 'red' },
            { id: 'arabic', label: '🌙 أفلام عربية', type: 'عربي', contentType: 'movie', limit: 100, clr: 'gold' },
            { id: 'asian', label: '🏯 أفلام آسيوية', type: 'أسيوي', contentType: 'movie', limit: 100, clr: 'red' },
            { id: 'turkish-movies', label: '🇹🇷 أفلام تركية', type: 'تركي', contentType: 'movie', limit: 100, clr: 'purple' },
            { id: 'hindi', label: '🇮🇳 أفلام هندية', type: 'هندي', contentType: 'movie', limit: 100, clr: 'orange' },
            { id: 'arabic-series', label: '🌙 مسلسلات عربية', type: 'عربي', contentType: 'series', limit: 100, sortBy: 'random', clr: 'gold' },
            { id: 'turkish-completed', label: '🇹🇷 مسلسلات تركية منتهية', type: 'تركي', contentType: 'series', isComplete: true, limit: 100, clr: 'purple' },
            { id: 'turkish-ongoing', label: '🇹🇷 مسلسلات تركية (المستمرة)', type: 'تركي', contentType: 'series', isComplete: false, limit: 100, clr: 'purple' },
            { id: 'asian-series-completed', label: '🏯 مسلسلات آسيوية منتهية', type: 'أسيوي', contentType: 'series', isComplete: true, limit: 100, clr: 'red' },
            { id: 'asian-series-ongoing', label: '🏯 مسلسلات آسيوية (المستمرة)', type: 'أسيوي', contentType: 'series', isComplete: false, limit: 100, clr: 'red' },
            { id: 'anime', label: '🎌 أنمي', type: null, contentType: null, typeCheck: (t, item) => ['انمي','أنمي','anime'].includes((t||'').trim().toLowerCase()) && item.contentType !== 'series', limit: 100, clr: 'pink' },
            { id: 'anime-series', label: '🎌 مسلسلات أنمي', type: 'انمي', contentType: 'series', limit: 100, clr: 'pink' },
{ id: 'ooanime', label: '🎬 كرتون الزمن الجميل', type: 'كرتون', contentType: 'series', limit: 100, clr: 'orange' },
            { id: 'dubbed', label: '🔊 أفلام مدبلجة', type: 'مدبلج', contentType: 'movie', limit: 100, clr: 'teal' },
            { id: 'documentary', label: '📖 وثائقيات', type: 'وثائقي', contentType: null, limit: 100, clr: 'blue' },
        ];

        // ===== POPULATE YEAR FILTER =====
        function populateFilters() {
            updateYearOptions();
        }

        function updateYearOptions() {
            const typeVal = document.getElementById('typeFilter').value;
            const catVal = document.getElementById('categoryFilter').value;
            const years = new Set();
            contentData.forEach(m => {
                let skip = false;
                if (typeVal !== 'all') {
                    const ct = (m.contentType || '').toLowerCase();
                    if (typeVal === 'movie' && ct !== 'movie') skip = true;
                    if (typeVal === 'series' && ct !== 'series') skip = true;
                }
                if (!skip && catVal !== 'all') {
                    const it = (m.type || '').trim();
                    const ct = m.contentType || '';
                    if (catVal === 'اجنبي' && it !== 'أجنبي') skip = true;
                    else if (catVal === 'عربي' && it !== 'عربي') skip = true;
                    else if (catVal === 'هندي' && it !== 'هندي') skip = true;
                    else if (catVal === 'اسيوي' && it !== 'أسيوي') skip = true;
                    else if (catVal === 'نتفليكس' && it !== 'نتفليكس') skip = true;
                    else if (catVal === 'تركي' && it !== 'تركي' && it !== 'تركيي') skip = true;
                    else if (catVal === 'turkish-completed' && (it !== 'تركي' || ct !== 'series' || !m.isComplete)) skip = true;
                    else if (catVal === 'turkish-ongoing' && (it !== 'تركي' || ct !== 'series' || m.isComplete)) skip = true;
                    else if (catVal === 'asian-series-completed' && (it !== 'أسيوي' || ct !== 'series' || !m.isComplete)) skip = true;
                    else if (catVal === 'asian-series-ongoing' && (it !== 'أسيوي' || ct !== 'series' || m.isComplete)) skip = true;
                    else if (catVal === 'foreign-series' && (it !== 'أجنبي' || ct !== 'series')) skip = true;
                    else if (catVal === 'انمي' && !['أنمي','انمي'].includes(it)) skip = true;
                    else if (catVal === 'anime-series' && (!['أنمي','انمي'].includes(it) || ct !== 'series')) skip = true;
                    else if (catVal === 'مدبلج' && it !== 'مدبلج') skip = true;
                    else if (catVal === 'وثائقي' && it !== 'وثائقي') skip = true;
                    else if (catVal === 'imdb' && it !== 'IMDb') skip = true;
                    else if (catVal === 'streamimdb' && it !== 'StreamIMDb') skip = true;
                    else if (catVal === 'ooanime' && (it !== 'كرتون' || ct !== 'series')) skip = true;
                    else if (catVal === 'اخرى' && !['أجنبي','عربي','هندي','أسيوي','أنمي','انمي','نتفليكس','تركي','تركيي','مدبلج','وثائقي','IMDb','StreamIMDb','foreign-series','كرتون'].includes(it)) skip = true;
                }
                if (skip) return;
                let y = m.year || '';
                if (!y && m.title) { const match = m.title.match(/(\d{4})/); if (match) y = match[1]; }
                if (y) { const n = parseInt(y, 10); if (n >= 1888 && n <= 2026) years.add(y); }
            });
            const sel = document.getElementById('yearFilter');
            const currentVal = sel.value;
            sel.innerHTML = '<option value="all">📅 السنة</option>';
            Array.from(years).sort((a,b) => b-a).forEach(y => {
                const o = document.createElement('option');
                o.value = y; o.textContent = y; sel.appendChild(o);
            });
            if (years.has(currentVal)) sel.value = currentVal;
        }

        function extractYear(item) {
            let y = item.year || '';
            if (!y && item.title) { const m = item.title.match(/(\d{4})/); if (m) y = m[1]; }
            if (y) { const n = parseInt(y, 10); if (n < 1888 || n > 2026) y = ''; }
            return y;
        }

        function cleanTitle(title) {
            return title ? title.replace(/\s*\d{4}\s*$/, '').trim() : '';
        }

        function getTypeLabel(item) {
            const ct = item.contentType || '';
            const t = (item.type || '').trim();
            if (ct === 'series') return 'مسلسل';
            if (t === 'عربي') return 'عربي';
            if (t === 'أجنبي') return 'أجنبي';
            if (t === 'هندي') return 'هندي';
            if (t === 'أسيوي') return 'آسيوي';
            if (t === 'تركي') return 'تركي';
            if (t === 'IMDb') return 'IMDb';
            if (t === 'StreamIMDb') return 'أصلي';
            return t || 'فيلم';
        }

        // ===== BUILD CARD =====
        function badgeColor(typeLabel) {
            const m = {
                'مسلسل':'teal', 'عربي':'gold', 'أجنبي':'blue', 'هندي':'orange',
                'آسيوي':'red', 'أنمي':'pink', 'انمي':'pink', 'كرتون':'orange', 'تركي':'purple', 'نتفليكس':'red',
                'مدبلج':'teal', 'وثائقي':'blue', 'اطفال':'orange', 'أصلي':'gold',
            };
            return 'badge-' + (m[typeLabel] || 'gold');
        }

        function createCard(item, idx) {
            const title = item.title || 'بدون عنوان';
            const year = extractYear(item);
            const rating = item.rating || '';
            let poster = item.poster || '';
            const typeLabel = getTypeLabel(item);
            const isSeries = item.contentType === 'series';
            const isForeignSeries = isSeries && (item.type || '').trim() === 'أجنبي';

            const card = document.createElement('div');
                card.className = 'movie-card fade-up' + (isSeries ? ' series-card' : '') + (isForeignSeries ? ' foreign-series-card' : '');
            card.style.animationDelay = ((idx||0) % 10 * 40) + 'ms';

            const wrapper = document.createElement('div');
            wrapper.className = 'poster-wrapper';

            const img = document.createElement('img');
            img.loading = 'lazy';
            img.referrerPolicy = 'no-referrer';
            if (!poster) { poster = PLACEHOLDER_SVG; }
            img.src = poster;
            img.alt = title;
            img.onerror = function() {
                if (!this.dataset.fallback) { this.dataset.fallback = '1'; this.src = PLACEHOLDER_SVG; }
            };
            wrapper.appendChild(img);

            const overlay = document.createElement('div');
            overlay.className = 'poster-overlay';
            wrapper.appendChild(overlay);

            const info = document.createElement('div');
            info.className = 'card-info';
            info.innerHTML = `<h3>${title}</h3><div class="meta"><span>${year||''}</span><span>${isSeries ? '📺' : '🎥'}</span></div>`;
            wrapper.appendChild(info);

            const badge = document.createElement('div');
            badge.className = 'card-badge ' + badgeColor(typeLabel);
            badge.textContent = typeLabel;
            wrapper.appendChild(badge);

            if (rating) {
                const ratingEl = document.createElement('div');
                ratingEl.className = 'card-rating';
                ratingEl.textContent = '⭐ ' + rating;
                wrapper.appendChild(ratingEl);
            }

            card.appendChild(wrapper);
            card.addEventListener('click', () => openModal(item));
            return card;
        }

        // ===== RENDER SECTIONS (home page) =====
        function renderSections() {
            const container = document.getElementById('sectionsContainer');
            container.innerHTML = '';
            document.getElementById('movieGrid').style.display = 'none';
            document.getElementById('pagination').innerHTML = '';
            document.getElementById('counter').textContent = '';
            document.getElementById('backHomeRow').style.display = 'none';
            showingGrid = false;
            container.style.display = 'block';

            // Build side nav
            const navList = document.getElementById('sideNavList');
            navList.innerHTML = '';
            CATEGORIES.forEach(cat => {
                const dotClrs = {teal:'#2dd4bf',blue:'#60a5fa',orange:'#fb923c',red:'#f87171',purple:'#c084fc',pink:'#f472b6',gold:'#d4a843'};
                const a = document.createElement('a');
                a.href = '#';
                a.innerHTML = `<span class="nav-dot" style="background:${dotClrs[cat.clr]||'#d4a843'}"></span>${cat.label}`;
                a.addEventListener('click', e => {
                    e.preventDefault();
                    closeNav();
                    const idx = Array.from(document.querySelectorAll('#sectionsContainer > div')).findIndex(el => {
                        const h2 = el.querySelector('h2');
                        return h2 && h2.textContent === cat.label;
                    });
                    if (idx >= 0) {
                        document.querySelectorAll('#sectionsContainer > div')[idx].scrollIntoView({behavior:'smooth', block:'start'});
                    } else {
                        document.getElementById('categoryFilter').value = cat.id;
                        document.getElementById('searchInput').value = '';
                        updateYearOptions();
                        showFilteredGrid(contentData.filter(item => item), cat.label);
                    }
                });
                navList.appendChild(a);
            });

            CATEGORIES.forEach(cat => {
                let items;
                if (cat.id === 'recent') {
                    items = [...contentData].filter(item => item.contentType === 'movie').sort((a, b) => (b.dateAdded || 0) - (a.dateAdded || 0)).slice(0, cat.limit);
                } else if (cat.typeCheck) {
                    items = contentData.filter(item => cat.typeCheck(item.type, item));
                } else if (cat.type === null && cat.contentType === 'series') {
                    items = contentData.filter(item => item.contentType === 'series');
                } else if (cat.isComplete !== undefined) {
                    items = contentData.filter(item => (item.type || '').trim() === cat.type && item.contentType === 'series' && item.isComplete === cat.isComplete);
                } else if (cat.id === 'arabic-series') {
                    items = contentData.filter(item => item.contentType === 'series' && ((item.type || '').trim() === 'عربي' || (item.type || '').startsWith('رمضان')));
                } else if (cat.id === 'anime-series') {
                    items = contentData.filter(item => {
                        if ((item.type || '').trim() !== 'انمي' || item.contentType !== 'series') return false;
                        const eps = (item.seasons || []).reduce((s, sq) => s + (sq.episodes || []).length, 0);
                        return eps > 1;
                    });
                } else {
                    items = contentData.filter(item => (item.type || '').trim() === cat.type && item.contentType === (cat.contentType || item.contentType));
                }

                if (items.length === 0) return;

                const sectionEl = document.createElement('div');
                sectionEl.className = 'mb-5';

                const header = document.createElement('div');
                header.className = 'flex items-center justify-between mb-2 section-accent section-accent-' + (cat.clr||'gold');

                const titleEl = document.createElement('h2');
                titleEl.className = 'text-base md:text-lg font-bold text-white';
                const accentColors = {teal:'rgba(45,212,191,.8)',blue:'rgba(96,165,250,.8)',orange:'rgba(251,146,60,.8)',red:'rgba(248,113,113,.8)',purple:'rgba(192,132,252,.8)',pink:'rgba(244,114,182,.8)',gold:'rgba(212,168,67,.8)'};
                titleEl.style.color = accentColors[cat.clr] || '#d4a843';
                titleEl.textContent = cat.label;
                header.appendChild(titleEl);

                const viewAllBtn = document.createElement('button');
                viewAllBtn.className = 'section-title-btn';
                viewAllBtn.textContent = `عرض الكل (${items.length})`;
                viewAllBtn.addEventListener('click', () => {
                    document.getElementById('categoryFilter').value = cat.id;
                    document.getElementById('searchInput').value = '';
                    updateYearOptions();
                    showFilteredGrid(items, cat.label);
                });
                header.appendChild(viewAllBtn);
                sectionEl.appendChild(header);

                const sorted = cat.sortBy === 'title'
                    ? [...items].sort((a, b) => (a.title || '').localeCompare(b.title || '', 'ar'))
                    : cat.id === 'recent'
                        ? [...items]
                        : [...items]
                            .sort(() => Math.random() - 0.5)
                            .sort((a, b) => (parseInt(b.year) || 0) - (parseInt(a.year) || 0));
                const display = sorted.slice(0, cat.limit);

                const wrapper = document.createElement('div');
                wrapper.className = 'scroll-wrapper';

                const scrollDiv = document.createElement('div');
                scrollDiv.className = 'section-scroll' + (cat.id === 'arabic-series' || cat.id === 'foreign-series' || cat.id === 'turkish-completed' || cat.id === 'turkish-ongoing' || cat.id === 'asian-series-completed' || cat.id === 'asian-series-ongoing' || cat.id === 'anime-series' ? ' turkish-scroll' : '');
                display.forEach((item, i) => {
                    scrollDiv.appendChild(createCard(item, i));
                });

                const rightBtn = document.createElement('button');
                rightBtn.className = 'scroll-overlay next';
                rightBtn.innerHTML = '›';
                rightBtn.addEventListener('click', () => {
                    scrollDiv.scrollLeft = scrollDiv.scrollLeft - 720;
                });
                const leftBtn = document.createElement('button');
                leftBtn.className = 'scroll-overlay prev';
                leftBtn.innerHTML = '‹';
                leftBtn.addEventListener('click', () => {
                    scrollDiv.scrollLeft = scrollDiv.scrollLeft + 720;
                });

                function updateArrows() {
                    const atStart = scrollDiv.scrollLeft < 10;
                    const atEnd = scrollDiv.scrollLeft + scrollDiv.clientWidth >= scrollDiv.scrollWidth - 10;
                    rightBtn.classList.toggle('hidden-arrow', atStart);
                    leftBtn.classList.toggle('hidden-arrow', atEnd);
                }
                scrollDiv.addEventListener('scroll', updateArrows);
                new ResizeObserver(updateArrows).observe(scrollDiv);
                requestAnimationFrame(updateArrows);

                wrapper.appendChild(rightBtn);
                wrapper.appendChild(scrollDiv);
                wrapper.appendChild(leftBtn);
                sectionEl.appendChild(wrapper);
                container.appendChild(sectionEl);
            });
        }

        // ===== SHOW FILTERED GRID =====
        function showFilteredGrid(items, label) {
            showingGrid = true;
            document.getElementById('sectionsContainer').style.display = 'none';
            document.getElementById('movieGrid').style.display = 'grid';
            document.getElementById('backHomeRow').style.display = 'block';
            document.getElementById('counter').textContent = `${items.length} نتيجة — ${label || ''}`.trim();
            filteredMovies = sortItems(items);
            currentPage = 1;
            renderGrid();
        }

        function sortItems(items) {
            const s = sortMode !== 'default' ? sortMode : document.getElementById('sortFilter').value;
            const arr = [...items];
            if (s === 'newest') return arr.sort((a, b) => (parseInt(extractYear(b)) || 0) - (parseInt(extractYear(a)) || 0));
            if (s === 'oldest') return arr.sort((a, b) => (parseInt(extractYear(a)) || 0) - (parseInt(extractYear(b)) || 0));
            if (s === 'rating') return arr.sort((a, b) => { const ra = parseFloat(a.rating) || 0; const rb = parseFloat(b.rating) || 0; return rb - ra; });
            if (s === 'alpha') return arr.sort((a, b) => (a.title || '').localeCompare(b.title || '', 'ar'));
            if (s === 'random') return arr.sort(() => Math.random() - 0.5);
            return arr;
        }

        // ===== RENDER GRID =====
        function renderGrid() {
            const totalPages = Math.ceil(filteredMovies.length / ITEMS_PER_PAGE) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            const start = (currentPage - 1) * ITEMS_PER_PAGE;
            const pageItems = filteredMovies.slice(start, start + ITEMS_PER_PAGE);

            const grid = document.getElementById('movieGrid');
            grid.innerHTML = '';

            if (pageItems.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center text-gray-600 py-20 text-sm">لا توجد نتائج</div>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            pageItems.forEach((item, idx) => {
                grid.appendChild(createCard(item, idx));
            });

            renderPagination(totalPages);
        }

        // ===== PAGINATION =====
        function renderPagination(totalPages) {
            const container = document.getElementById('pagination');
            container.innerHTML = '';
            if (totalPages <= 1) return;

            const prev = document.createElement('button');
            prev.className = 'page-btn'; prev.textContent = '‹ السابق';
            prev.disabled = currentPage === 1;
            prev.addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderGrid(); window.scrollTo({top:0,behavior:'smooth'}); } });
            container.appendChild(prev);

            const maxVis = 7;
            let sp = Math.max(1, currentPage - Math.floor(maxVis/2));
            let ep = Math.min(totalPages, sp + maxVis - 1);
            if (ep - sp < maxVis - 1) sp = Math.max(1, ep - maxVis + 1);

            if (sp > 1) {
                const f = document.createElement('button'); f.className = 'page-btn'; f.textContent = '1';
                f.addEventListener('click', () => { currentPage=1; renderGrid(); window.scrollTo({top:0,behavior:'smooth'}); });
                container.appendChild(f);
                if (sp > 2) { const d = document.createElement('span'); d.className = 'text-gray-600 px-1 text-sm'; d.textContent='...'; container.appendChild(d); }
            }
            for (let i = sp; i <= ep; i++) {
                const b = document.createElement('button');
                b.className = `page-btn ${i===currentPage?'active-page':''}`;
                b.textContent = i;
                b.addEventListener('click', () => { currentPage=i; renderGrid(); window.scrollTo({top:0,behavior:'smooth'}); });
                container.appendChild(b);
            }
            if (ep < totalPages) {
                if (ep < totalPages-1) { const d = document.createElement('span'); d.className = 'text-gray-600 px-1 text-sm'; d.textContent='...'; container.appendChild(d); }
                const l = document.createElement('button'); l.className = 'page-btn'; l.textContent = totalPages;
                l.addEventListener('click', () => { currentPage=totalPages; renderGrid(); window.scrollTo({top:0,behavior:'smooth'}); });
                container.appendChild(l);
            }

            const next = document.createElement('button');
            next.className = 'page-btn'; next.textContent = 'التالي ›';
            next.disabled = currentPage === totalPages;
            next.addEventListener('click', () => { if (currentPage < totalPages) { currentPage++; renderGrid(); window.scrollTo({top:0,behavior:'smooth'}); } });
            container.appendChild(next);
        }

        // ===== VIDEO PLAYBACK (from 1010.html) =====
        function startPlayback(url) {
            const container = document.getElementById('videoPlayer');
            const vs = document.getElementById('volumeSection');
            container.innerHTML = '';
            if (!url) {
                container.innerHTML = '<div class="text-center p-4 text-gray-500 text-sm">لا يتوفر رابط تشغيل</div>';
                return;
            }
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                let vid;
                if (url.includes('youtube.com/embed')) { vid = url.split('/embed/')[1].split('?')[0]; }
                else { const m = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/); vid = (m && m[2].length===11) ? m[2] : null; }
                if (vid) {
                    const e = document.createElement('iframe'); e.src='https://www.youtube.com/embed/'+vid+'?autoplay=1&rel=0&modestbranding=1'; e.className='w-full h-full border-0'; e.allowFullscreen=true; e.setAttribute('allow','accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture'); container.appendChild(e);
                    if (vs) vs.style.display = '';
                } else { container.innerHTML = '<div class="text-center p-4 text-gray-500 text-sm">رابط يوتيوب غير صالح</div>'; }
            } else if (url.endsWith('.mp4') || url.endsWith('.webm') || url.endsWith('.ogg')) {
                const v = document.createElement('video'); v.className='w-full h-full'; v.controls=true; v.setAttribute('playsinline','');
                const s = document.createElement('source'); s.src=url; s.type='video/mp4'; v.appendChild(s);
                container.appendChild(v);
                if (vs) vs.style.display = '';
                const vol = document.getElementById('volumeControl');
                if (vol) { v.volume = vol.value/100; }
                v.play().catch(function(){});
            } else {
                const e = document.createElement('iframe'); e.src=url; e.className='w-full h-full border-0'; e.allowFullscreen=true;
                container.appendChild(e);
            }
        }

        function clearPlayer() {
            const container = document.getElementById('videoPlayer');
            if (container) {
                container.innerHTML = '<div id="videoPlaceholder" class="text-center p-4"><div class="text-4xl mb-2 opacity-40">▶</div><p class="text-sm text-gray-500">اختر سيرفر للمشاهدة</p></div>';
            }
        }

        document.getElementById('volumeControl').addEventListener('input', function(){
            document.getElementById('volumeLabel').textContent = this.value + '%';
            const vid = document.querySelector('#videoPlayer video');
            if (vid) vid.volume = this.value / 100;
        });

        // ===== MODAL =====
        function openModal(item) {
            clearPlayer();
            const modal = document.getElementById('videoModal');
            const titleEl = document.getElementById('modalTitle');
            const posterImg = document.getElementById('modalPosterImg');
            const metaEl = document.getElementById('modalMeta');
            const descEl = document.getElementById('modalDescription');
            const serverList = document.getElementById('serverList');
            const serverLabel = document.getElementById('serverLabel');
            const seasonSel = document.getElementById('seasonSelector');
            const episodeSel = document.getElementById('episodeSelector');
            const infoEl = document.getElementById('movieInfo');
            const downloadSection = document.getElementById('downloadSection');
            const trailerSection = document.getElementById('trailerSection');

            const title = item.title || 'بدون عنوان';
            const year = extractYear(item);
            titleEl.textContent = title + (year ? ' (' + year + ')' : '');
            posterImg.src = (item.poster || NO_POSTER);
            posterImg.onerror = function() { if (!this.dataset.f) { this.dataset.f='1'; this.src=NO_POSTER; } };

            const description = item.description || 'لا توجد قصة متاحة';
            descEl.textContent = description;

            const rating = item.rating || '';
            const quality = item.quality || '';
            const duration = item.duration || '';
            const categories = (item.categories || []).join(' · ') || 'بدون تصنيف';
            const typeLabel = getTypeLabel(item);

            let metaHtml = `<span>${typeLabel}</span>`;
            if (year) metaHtml += ` <span>• ${year}</span>`;
            if (rating) metaHtml += ` <span>• ⭐ ${rating}</span>`;
            if (quality) metaHtml += ` <span>• ${quality}</span>`;
            if (duration) metaHtml += ` <span>• ${duration}</span>`;
            metaHtml += ` <span>• ${categories}</span>`;
            metaEl.innerHTML = metaHtml;

            const isSeries = item.contentType === 'series';
            let currentServers = [];
            let defaultUrl = item.trial || '';
            let hasServers = false;

            function sortServers(arr) {
                return arr.slice().sort((a, b) => {
                    if (a.name === 'Larhu') return -1;
                    if (b.name === 'Larhu') return 1;
                    return 0;
                });
            }

            if (isSeries) {
                const seasons = item.seasons || [];
                seasonSel.style.display = 'flex';
                episodeSel.style.display = 'flex';
                seasonSel.innerHTML = '';
                episodeSel.innerHTML = '';

                function showServersForEpisode(episode) {
                    serverList.innerHTML = '';
                    const eps = sortServers(episode.servers || []);
                    if (eps.length === 0) {
                        serverLabel.style.display = 'none';
                        serverList.innerHTML = '<span class="text-gray-600 text-sm">لا توجد سيرفرات لهذه الحلقة</span>';
                        clearPlayer();
                    } else {
                        serverLabel.style.display = 'block';
                        eps.forEach((s, i) => {
                            const btn = document.createElement('button');
                            btn.className = `server-btn ${i===0?'active':''}`;
                            btn.textContent = s.name || `سيرفر ${i+1}`;
                            btn.addEventListener('click', () => {
                                document.querySelectorAll('#serverList .server-btn').forEach(b=>b.classList.remove('active'));
                                btn.classList.add('active');
                                startPlayback(s.url);
                            });
                            serverList.appendChild(btn);
                        });
                        const def = eps.find(s=>s.isDefault) || eps[0];
                        if (def) { startPlayback(def.url); hasServers = true; }
                    }
                    const dls = episode.downloadServers || [];
                    const dlList = document.getElementById('downloadList');
                    if (dls.length > 0) {
                        downloadSection.style.display = 'block';
                        dlList.innerHTML = '';
                        dls.forEach(ds => {
                            const a = document.createElement('a');
                            a.href = ds.url; a.target = '_blank'; a.className = 'server-btn';
                            a.textContent = '⬇ ' + (ds.name || 'تحميل');
                            dlList.appendChild(a);
                        });
                    } else { downloadSection.style.display = 'none'; }
                }

                function buildEpisodes(season) {
                    episodeSel.innerHTML = '';
                    const eps = season.episodes || [];
                    const perPage = 10;
                    let epPage = 0;
                    function renderEpPage() {
                        episodeSel.innerHTML = '';
                        const s = epPage * perPage, e = Math.min(s+perPage, eps.length);
                        const pageEps = eps.slice(s, e);
                        if (epPage > 0) {
                            const pb = document.createElement('button'); pb.className='episode-btn'; pb.textContent='‹'; pb.style.fontSize='18px';
                            pb.addEventListener('click', ()=>{epPage--;renderEpPage();});
                            episodeSel.appendChild(pb);
                        }
                        pageEps.forEach(ep => {
                            const b = document.createElement('button'); b.className='episode-btn';
                            b.textContent = `الحلقة ${ep.episodeNumber || ep.number || ''}`;
                            b.addEventListener('click', ()=>{
                                episodeSel.querySelectorAll('button').forEach(x=>x.classList.remove('active'));
                                b.classList.add('active'); showServersForEpisode(ep);
                            });
                            episodeSel.appendChild(b);
                        });
                        if (e < eps.length) {
                            const nb = document.createElement('button'); nb.className='episode-btn'; nb.textContent='›'; nb.style.fontSize='18px';
                            nb.addEventListener('click', ()=>{epPage++;renderEpPage();});
                            episodeSel.appendChild(nb);
                        }
                        if (!episodeSel.querySelector('.active') && pageEps.length>0) {
                            const fb = episodeSel.querySelector('button');
                            if (fb) { fb.classList.add('active'); showServersForEpisode(pageEps[0]); }
                        }
                    }
                    renderEpPage();
                }

                seasons.forEach((s, idx) => {
                    const b = document.createElement('button');
                    b.className = `season-btn ${idx===0?'active':''}`;
                    b.textContent = `الموسم ${s.seasonNumber || s.season || ''}`;
                    b.addEventListener('click', () => {
                        seasonSel.querySelectorAll('button').forEach(x=>x.classList.remove('active'));
                        b.classList.add('active'); buildEpisodes(s);
                    });
                    seasonSel.appendChild(b);
                });
                if (seasons.length > 0) buildEpisodes(seasons[0]);
            } else {
                seasonSel.style.display = 'none';
                episodeSel.style.display = 'none';
                currentServers = item.servers || [];
            }

            let currentDownloadServers = item.downloadServers || [];

            trailerSection.innerHTML = '';
            const searchQuery = encodeURIComponent((cleanTitle(title)||title)+' '+year);
            if (defaultUrl) {
                const a = document.createElement('a');
                a.href = defaultUrl; a.target = '_blank'; a.className = 'server-btn';
                a.textContent = '▶ تريال';
                trailerSection.appendChild(a);
            }
            const imdb = document.createElement('a');
            imdb.href = 'https://www.imdb.com/find?q='+searchQuery; imdb.target = '_blank';
            imdb.className = 'server-btn'; imdb.textContent = '🎬 IMDB';
            trailerSection.appendChild(imdb);

            if (!isSeries) {
                serverList.innerHTML = '';
                if (currentServers.length === 0) {
                    serverLabel.style.display = 'none';
                    serverList.innerHTML = '<span class="text-gray-600 text-sm">لا توجد سيرفرات متاحة</span>';
                } else {
                    serverLabel.style.display = 'block';
                    currentServers = sortServers(currentServers);
                    currentServers.forEach((s, i) => {
                        const b = document.createElement('button');
                        b.className = `server-btn ${i===0?'active':''}`;
                        b.textContent = s.name || `سيرفر ${i+1}`;
                        b.addEventListener('click', () => {
                            document.querySelectorAll('#serverList .server-btn').forEach(x=>x.classList.remove('active'));
                            b.classList.add('active'); startPlayback(s.url);
                        });
                        serverList.appendChild(b);
                    });
                    const def = currentServers.find(s=>s.isDefault) || currentServers[0];
                    if (def) { startPlayback(def.url); hasServers = true; }
                }
            }

            if (defaultUrl && !hasServers) startPlayback(defaultUrl);

            if (!isSeries) {
                const dlList = document.getElementById('downloadList');
                if (currentDownloadServers.length > 0) {
                    downloadSection.style.display = 'block';
                    dlList.innerHTML = '';
                    currentDownloadServers.forEach(ds => {
                        const a = document.createElement('a');
                        a.href = ds.url; a.target = '_blank'; a.className = 'server-btn';
                        a.textContent = '⬇ ' + (ds.name || 'تحميل');
                        dlList.appendChild(a);
                    });
                } else { downloadSection.style.display = 'none'; }
            }

            const cast = (item.cast || []).join('، ') || '';
            let infoHtml = '';
            if (cast) infoHtml += `<div class="mb-2"><strong class="text-white/60">🌟 طاقم التمثيل:</strong> ${cast}</div>`;
            infoEl.innerHTML = infoHtml;

            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        document.getElementById('closeModal').addEventListener('click', closeModal);
        document.getElementById('videoModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

        function closeModal() {
            document.getElementById('videoModal').style.display = 'none';
            clearPlayer();
            document.body.style.overflow = '';
        }

        // ===== FILTERING LOGIC (for search/filter from sections) =====
        function applyFilters() {
            const searchVal = document.getElementById('searchInput').value.trim().toLowerCase();
            const typeVal = document.getElementById('typeFilter').value;
            const catVal = document.getElementById('categoryFilter').value;
            const yearVal = document.getElementById('yearFilter').value;
            sortMode = document.getElementById('sortFilter').value;

            document.getElementById('clearSearch').style.display = searchVal ? 'flex' : 'none';
            document.getElementById('resetFilters').style.display = (searchVal || typeVal !== 'all' || catVal !== 'all' || yearVal !== 'all' || sortMode !== 'default') ? 'inline-flex' : 'none';

            const results = contentData.filter(item => {
                const title = (item.title || '').toLowerCase();
                const type = (item.contentType || item.type || '').toLowerCase();
                const cats = (item.categories || []).join(' ').toLowerCase();
                const desc = (item.description || '').toLowerCase();
                const cast = (item.cast || []).join(' ').toLowerCase();
                const year = extractYear(item);
                if (searchVal && !title.includes(searchVal) && !cats.includes(searchVal) && !desc.includes(searchVal) && !cast.includes(searchVal)) return false;
                if (typeVal !== 'all') {
                    if (typeVal === 'movie' && type !== 'movie') return false;
                    if (typeVal === 'series' && type !== 'series') return false;
                }
                if (catVal !== 'all') {
                    const it = (item.type || '').trim();
                    const ct = item.contentType || '';
                    if (catVal === 'اجنبي' && it !== 'أجنبي') return false;
                    else if (catVal === 'عربي' && it !== 'عربي') return false;
                    else if (catVal === 'هندي' && it !== 'هندي') return false;
                    else if (catVal === 'اسيوي' && it !== 'أسيوي') return false;
                    else if (catVal === 'نتفليكس' && it !== 'نتفليكس') return false;
                    else if (catVal === 'تركي' && it !== 'تركي' && it !== 'تركيي') return false;
                    else if (catVal === 'turkish-completed' && (it !== 'تركي' || ct !== 'series' || !item.isComplete)) return false;
                    else if (catVal === 'turkish-ongoing' && (it !== 'تركي' || ct !== 'series' || item.isComplete)) return false;
                    else if (catVal === 'asian-series-completed' && (it !== 'أسيوي' || ct !== 'series' || !item.isComplete)) return false;
                    else if (catVal === 'asian-series-ongoing' && (it !== 'أسيوي' || ct !== 'series' || item.isComplete)) return false;
                    else if (catVal === 'foreign-series' && (it !== 'أجنبي' || ct !== 'series')) return false;
                    else if (catVal === 'انمي' && !['أنمي','انمي'].includes(it)) return false;
                    else if (catVal === 'anime-series' && (!['أنمي','انمي'].includes(it) || ct !== 'series')) return false;
                    else if (catVal === 'مدبلج' && it !== 'مدبلج') return false;
                    else if (catVal === 'وثائقي' && it !== 'وثائقي') return false;
                    else if (catVal === 'imdb' && it !== 'IMDb') return false;
                    else if (catVal === 'streamimdb' && it !== 'StreamIMDb') return false;
                    else if (catVal === 'ooanime' && (it !== 'كرتون' || ct !== 'series')) return false;
                    else if (catVal === 'اخرى' && !['أجنبي','عربي','هندي','أسيوي','أنمي','انمي','نتفليكس','تركي','تركيي','مدبلج','وثائقي','IMDb','StreamIMDb','foreign-series','كرتون','عربي'].includes(it)) return false;
                }
                if (yearVal !== 'all' && year !== yearVal) return false;
                return true;
            });

            // Map category ID to label for display
            const catLabels = { 'اجنبي':'أجنبي', 'عربي':'عربي', 'هندي':'هندي', 'اسيوي':'آسيوي', 'نتفليكس':'نت فليكس', 'تركي':'تركي', 'انمي':'أنمي', 'مدبلج':'مدبلج', 'وثائقي':'وثائقي', 'imdb':'Top IMDb', 'streamimdb':'أفلام أجنبية أصلية', 'turkish-completed':'مسلسلات تركية منتهية', 'turkish-ongoing':'مسلسلات تركية (المستمرة)', 'asian-series-completed':'مسلسلات آسيوية منتهية', 'asian-series-ongoing':'مسلسلات آسيوية (المستمرة)', 'anime-series':'مسلسلات أنمي', 'foreign-series':'مسلسلات أجنبية', 'ooanime':'كرتون الزمن الجميل', 'اخرى':'أخرى' };
            const label = catLabels[catVal] || '';

            if (results.length === contentData.length && !searchVal && typeVal === 'all' && catVal === 'all' && yearVal === 'all') {
                // No filters active, show sections
                renderSections();
            } else {
                showFilteredGrid(results, searchVal ? `بحث: "${document.getElementById('searchInput').value}"` : label);
            }
        }

        // ===== SIDE NAV =====
        function openNav() {
            document.getElementById('sideNav').classList.remove('translate-x-full');
            document.getElementById('sideNavOverlay').classList.remove('hidden');
            setTimeout(() => document.getElementById('sideNavOverlay').classList.remove('opacity-0'), 10);
            document.body.classList.add('nav-open');
        }
        function closeNav() {
            document.getElementById('sideNav').classList.add('translate-x-full');
            document.getElementById('sideNavOverlay').classList.add('opacity-0');
            setTimeout(() => { document.getElementById('sideNavOverlay').classList.add('hidden'); document.body.classList.remove('nav-open'); }, 300);
        }
        document.getElementById('navToggle').addEventListener('click', openNav);
        document.getElementById('logoLink').addEventListener('click', e => { e.preventDefault(); openNav(); });
        document.getElementById('sideNavClose').addEventListener('click', closeNav);
        document.getElementById('sideNavOverlay').addEventListener('click', closeNav);

        // ===== EVENT HANDLERS =====
        document.getElementById('searchInput').addEventListener('input', () => { currentPage=1; applyFilters(); });
        document.getElementById('typeFilter').addEventListener('change', () => { currentPage=1; applyFilters(); updateYearOptions(); });
        document.getElementById('categoryFilter').addEventListener('change', () => { currentPage=1; applyFilters(); updateYearOptions(); });
        document.getElementById('yearFilter').addEventListener('change', () => { currentPage=1; applyFilters(); });
        document.getElementById('sortFilter').addEventListener('change', () => { sortMode = document.getElementById('sortFilter').value; if (showingGrid) { filteredMovies = sortItems(filteredMovies); currentPage = 1; renderGrid(); } });

        document.getElementById('clearSearch').addEventListener('click', () => {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchInput').focus();
            applyFilters();
        });

        document.getElementById('resetFilters').addEventListener('click', () => {
            document.getElementById('searchInput').value = '';
            document.getElementById('typeFilter').value = 'all';
            document.getElementById('categoryFilter').value = 'all';
            document.getElementById('yearFilter').value = 'all';
            document.getElementById('sortFilter').value = 'default';
            sortMode = 'default';
            updateYearOptions();
            if (showingGrid) renderSections();
            else { applyFilters(); }
            document.getElementById('clearSearch').style.display = 'none';
            document.getElementById('resetFilters').style.display = 'none';
        });

        // Header search -> main search
        document.getElementById('headerSearch').addEventListener('input', function() {
            document.getElementById('searchInput').value = this.value;
            currentPage = 1;
            applyFilters();
        });

        // Mobile search -> focus main search
        document.getElementById('mobileSearchBtn').addEventListener('click', function() {
            document.getElementById('searchInput').focus();
            window.scrollTo({ top: document.getElementById('searchInput').offsetTop - 80, behavior: 'smooth' });
        });

        document.getElementById('backHomeBtn').addEventListener('click', () => {
            document.getElementById('searchInput').value = '';
            document.getElementById('typeFilter').value = 'all';
            document.getElementById('categoryFilter').value = 'all';
            document.getElementById('yearFilter').value = 'all';
            document.getElementById('sortFilter').value = 'default';
            sortMode = 'default';
            document.getElementById('clearSearch').style.display = 'none';
            document.getElementById('resetFilters').style.display = 'none';
            updateYearOptions();
            renderSections();
        });
        document.getElementById('backFromModal').addEventListener('click', () => {
            document.getElementById('videoModal').style.display = 'none';
            clearPlayer();
        });

        // Back to top
        const backBtn = document.getElementById('backToTop');
        window.addEventListener('scroll', () => {
            backBtn.classList.toggle('show', window.scrollY > 400);
        });
        backBtn.addEventListener('click', () => window.scrollTo({top:0, behavior:'smooth'}));

        populateFilters();
        document.getElementById('totalCount').textContent = (contentData.length).toLocaleString() + '+ فيلم';
        renderSections();
    </script>
